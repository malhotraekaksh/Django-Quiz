<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: #f4f6f9;
        }

        .box{
            max-width: 700px;
            margin: auto;
            margin-top: 40px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>🧑‍🏫 Add Question</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-success w-100 mt-3">
            Save Question
        </button>
    </form>

</div>

</body>
</html>
