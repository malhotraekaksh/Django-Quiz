<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h6 class="text-muted">
            Question {{ current_index|add:1 }} of {{ total }}
        </h6>

        <!-- ✅ FIXED QUESTION FIELD -->
        <h3 class="mt-3 mb-4">
            {{ question.question_text }}
        </h3>

        <form method="POST">
            {% csrf_token %}

            <div class="d-grid gap-2">

                <button class="btn btn-outline-primary btn-lg"
                        name="answer" value="A">
                    {{ question.option_a }}
                </button>

                <button class="btn btn-outline-primary btn-lg"
                        name="answer" value="B">
                    {{ question.option_b }}
                </button>

                <button class="btn btn-outline-primary btn-lg"
                        name="answer" value="C">
                    {{ question.option_c }}
                </button>

                <button class="btn btn-outline-primary btn-lg"
                        name="answer" value="D">
                    {{ question.option_d }}
                </button>

            </div>
        </form>

        {% if result %}
            <div class="alert mt-4
                {% if result == 'correct' %}
                    alert-success
                {% else %}
                    alert-danger
                {% endif %}">

                You selected: {{ selected_answer }} → {{ result }}
            </div>
        {% endif %}

    </div>

</div>

</body>
</html>
