<!DOCTYPE html>

<html>
<head>
    <title>Quiz App</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body{
        background: #f3f4f8;
    }

    .quiz-card{
        max-width:700px;
        margin:auto;
        margin-top:40px;
        border-radius:20px;
    }

    .option-btn{
        text-align:left;
        padding:12px;
        margin-bottom:10px;
        border-radius:12px;
    }

    .question-box{
        border-left:5px solid #6f42c1;
        padding-left:15px;
    }

</style>
```

</head>

<body>

<div class="container">

```
<div class="card shadow-lg quiz-card p-4">

    <div class="d-flex justify-content-between align-items-center">

        <h5 class="mb-0">
            🎯 Quiz Challenge
        </h5>

        <span class="badge bg-primary">
            Question {{ current_index|add:1 }}/{{ total }}
        </span>

    </div>

    <hr>

    <div class="progress mb-4">

        <div class="progress-bar"
             style="width:{% widthratio current_index total 100 %}%">
        </div>

    </div>

    <div class="question-box mb-4">

        <h3>
            {{ question.question_text }}
        </h3>

    </div>

    <form method="POST">

        {% csrf_token %}

        <button class="btn btn-outline-primary w-100 option-btn"
                name="answer"
                value="A">
            A. {{ question.option_a }}
        </button>

        <button class="btn btn-outline-primary w-100 option-btn"
                name="answer"
                value="B">
            B. {{ question.option_b }}
        </button>

        <button class="btn btn-outline-primary w-100 option-btn"
                name="answer"
                value="C">
            C. {{ question.option_c }}
        </button>

        <button class="btn btn-outline-primary w-100 option-btn"
                name="answer"
                value="D">
            D. {{ question.option_d }}
        </button>

    </form>

    {% if result %}

        <div class="alert mt-3
        {% if result == 'correct' %}
            alert-success
        {% else %}
            alert-danger
        {% endif %}
        ">

            You selected: {{ selected_answer }}

        </div>

    {% endif %}

</div>
```

</div>

</body>
</html>
