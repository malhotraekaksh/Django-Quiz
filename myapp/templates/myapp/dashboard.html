<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .box{
            max-width:600px;
            margin:auto;
            margin-top:60px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
            text-align:center;
        }

        .btn{
            width:100%;
            margin-top:15px;
            padding:12px;
            font-size:18px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>🧑‍🏫 Teacher Dashboard</h2>
    <p>Choose what you want to do</p>

    <a href="/add-question/" class="btn btn-success">
        ➕ Add Question
    </a>

    <a href="/quiz/" class="btn btn-primary">
        📋 View / Attempt Quiz
    </a>

    <a href="/start/" class="btn btn-warning">
        🧠 Start Fresh Quiz
    </a>

</div>

</body>
</html>
