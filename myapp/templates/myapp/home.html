{% load static %}

<!DOCTYPE html>
<html>

<head>
    <title>My Notes App</title>

    <link rel="stylesheet" href="{% static 'myapp/style.css' %}">
</head>

<body>

    <h1>📝 My Notes App</h1>

    {% for note in notes %}

        <h2>{{ note.title }}</h2>

        <p>{{ note.content }}</p>

        <hr>

    {% endfor %}

</body>

</html>
